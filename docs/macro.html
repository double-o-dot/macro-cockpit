<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Macro Cockpit - Top-Down 매크로 대시보드</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23D97757'/></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        colors: {
          dark:   { 50:'#e2e8f0', 100:'#cbd5e1', 200:'#94a3b8', 300:'#64748b', 400:'#475569', 500:'#334155', 600:'#1e293b', 700:'#1a1f2e', 800:'#151a26', 900:'#0f1419' },
          accent: { 50:'#FEF3ED', 100:'#FDE5D8', DEFAULT:'#D97757', dark:'#B85E42' },
          up:     '#22c55e',
          down:   '#ef4444',
          warn:   '#f59e0b',
          info:   '#3b82f6',
        }
      }
    }
  }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="shared/theme.css">
  <style>
    body.dark-macro {
      background: #0f1419 !important;
      color: #e2e8f0 !important;
    }
    body.dark-macro .topnav {
      background: #151a26 !important;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    body.dark-macro .bnav {
      background: #151a26 !important;
      border-top: 1px solid rgba(255,255,255,.08);
    }
    body.dark-macro .bnav a { color: rgba(255,255,255,.4); }
    body.dark-macro .bnav a.active { color: #D97757; }
    body.dark-macro .bnav a .dot { background: transparent; }
    body.dark-macro .bnav a.active .dot { background: #D97757; }
    body.dark-macro ::-webkit-scrollbar { width: 6px; }
    body.dark-macro ::-webkit-scrollbar-track { background: transparent; }
    body.dark-macro ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }

    @keyframes gaugeGrow { from { stroke-dasharray: 0 283; } }
    .gauge-circle { animation: gaugeGrow 1.2s ease-out forwards; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn .3s ease; }

    .badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:9999px; font-size:11px; font-weight:600; white-space:nowrap; }
    .badge-strong-up   { background:rgba(34,197,94,.15);  color:#22c55e; }
    .badge-moderate-up  { background:rgba(34,197,94,.1);   color:#4ade80; }
    .badge-sideways     { background:rgba(148,163,184,.15); color:#94a3b8; }
    .badge-moderate-dn  { background:rgba(245,158,11,.15); color:#f59e0b; }
    .badge-strong-dn    { background:rgba(239,68,68,.15);  color:#ef4444; }
    .badge-reversal     { background:rgba(234,179,8,.15);  color:#eab308; }

    .section-card {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 16px;
      padding: 24px;
    }

    .macro-table { width:100%; border-collapse:collapse; }
    .macro-table th {
      text-align:left; font-size:11px; font-weight:600; color:#64748b;
      text-transform:uppercase; letter-spacing:.05em; padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .macro-table td {
      padding:12px; font-size:13px;
      border-bottom:1px solid rgba(255,255,255,.04);
      vertical-align:middle;
    }
    .macro-table tbody tr { transition:background .15s; cursor:pointer; }
    .macro-table tbody tr:hover { background:rgba(255,255,255,.04); }

    .table-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .table-scroll::-webkit-scrollbar { height:4px; }
    .table-scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:2px; }

    .cat-header {
      display:flex; align-items:center; justify-content:space-between;
      cursor:pointer; user-select:none;
    }
    .cat-header:hover { opacity:.85; }

    .score-badge {
      display:inline-flex; align-items:center; padding:4px 12px;
      border-radius:9999px; font-size:12px; font-weight:700;
    }

    .detail-panel {
      background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06);
      border-radius:12px; padding:16px; margin-top:8px;
    }

    .sparkline-canvas { width:80px; height:28px; }

    .mini-gauge { position:relative; display:inline-flex; align-items:center; justify-content:center; }

    .alert-card {
      background:rgba(255,255,255,.03); border-radius:12px;
      padding:14px 18px; border-left:3px solid;
    }
    .alert-danger  { border-color:#ef4444; }
    .alert-caution { border-color:#f59e0b; }
    .alert-bullish { border-color:#22c55e; }
    .alert-bearish { border-color:#ef4444; }
    .alert-info    { border-color:#3b82f6; }

    .yield-curve-wrap { position:relative; height:260px; }
    .cpi-ppi-wrap { position:relative; height:240px; }

    .topdown-flow {
      display:flex; align-items:center; justify-content:center; gap:8px;
      flex-wrap:wrap; padding:16px 0;
    }
    .topdown-flow .flow-step {
      background:rgba(255,255,255,.06); border-radius:10px;
      padding:10px 18px; font-size:12px; font-weight:600; color:#e2e8f0;
    }
    .topdown-flow .flow-arrow { color:#64748b; font-size:18px; }
  </style>
</head>

<body class="font-sans antialiased dark-macro" x-data="macroDashboard()" x-init="init()">

        <span x-text="userEmail ? userEmail.split('@')[0] : '로그아웃'"></span>
      </button>
    </template>
    <template x-if="!loggedIn">
      <button class="btn-login" onclick="window.location.href='portfolio.html'">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
        로그인
      </button>
    </template>
  </div>
</nav>

<!-- MOBILE BOTTOM NAV -->
<nav class="bnav" id="bottom-nav">
  <a href="index.html" data-nav="insights">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
    인사이트<div class="dot"></div>
  </a>
  <a href="prices.html" data-nav="prices">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
    주식가격<div class="dot"></div>
  </a>
  <a href="portfolio.html" data-nav="portfolio">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path d="M9 12l2 2 4-4"/></svg>
    포트폴리오<div class="dot"></div>
  </a>
  <a href="macro.html" class="active" data-nav="macro">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/></svg>
    매크로<div class="dot"></div>

<!-- MAIN CONTENT -->
<main class="min-h-screen max-w-[1100px] mx-auto px-4 pb-24 md:pb-8" style="padding-top:16px;">

  <!-- Error -->
  <template x-if="error">
    <div class="flex flex-col items-center justify-center py-20 text-center">
      <div class="w-16 h-16 rounded-full bg-red-500/10 flex items-center justify-center mb-4">
        <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>
      </div>
      <h3 class="text-base font-semibold text-dark-50 mb-2">데이터 로드 실패</h3>
      <p class="text-xs text-dark-300 mb-4 whitespace-pre-line" x-text="error"></p>
      <button @click="init()" class="text-xs px-4 py-2 rounded-lg bg-accent/20 text-accent hover:bg-accent/30 transition-colors">다시 시도</button>
    </div>
  </template>

  <!-- Loading -->
  <template x-if="loading && !error">
    <div class="flex flex-col items-center justify-center py-20">
      <div class="w-12 h-12 rounded-full border-2 border-dark-500 border-t-accent animate-spin mb-4"></div>
      <p class="text-sm text-dark-300">FRED 매크로 데이터 로딩 중...</p>
    </div>
  </template>

  <!-- Dashboard -->
  <template x-if="!loading && !error">
    <div class="space-y-5 fade-in">

      <!-- ===== SECTION 0: COMPOSITE HERO ===== -->
      <div class="section-card" style="background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,rgba(255,255,255,.01) 100%);">
        <div class="flex flex-col md:flex-row items-center gap-6 md:gap-10">
          <!-- Big Gauge -->
          <div class="relative flex-shrink-0">
            <svg width="160" height="160" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="8"/>
              <circle cx="50" cy="50" r="45" fill="none"
                      :stroke="getScoreColor(data.composite_score)"
                      stroke-width="8" stroke-linecap="round"
                      :stroke-dasharray="`${data.composite_score * 2.83} 283`"
                      transform="rotate(-90 50 50)"
                      class="gauge-circle"/>
            </svg>
            <div class="absolute inset-0 flex flex-col items-center justify-center">
              <span class="text-4xl font-extrabold" :style="`color:${getScoreColor(data.composite_score)}`" x-text="data.composite_score"></span>
              <span class="text-[10px] font-semibold text-dark-300 mt-0.5">/ 100</span>
            </div>
          </div>
          <!-- Info -->
          <div class="text-center md:text-left flex-1">
            <div class="text-[11px] font-semibold text-dark-300 uppercase tracking-widest mb-1">Macro Health Score</div>
            <h2 class="text-2xl font-bold mb-2" :style="`color:${getScoreColor(data.composite_score)}`" x-text="data.composite_label"></h2>
            <p class="text-sm text-dark-200 leading-relaxed max-w-lg" x-text="data.composite_summary"></p>
            <!-- Mini scores -->
            <div class="flex flex-wrap gap-3 mt-4 justify-center md:justify-start">
              <template x-for="cat in data.categories" :key="cat.key">
                <div class="flex items-center gap-2 px-3 py-1.5 rounded-lg" style="background:rgba(255,255,255,.04);">
                  <div class="w-2.5 h-2.5 rounded-full" :style="`background:${cat.color || getScoreColor(cat.score)}`"></div>
                  <span class="text-[11px] text-dark-200" x-text="cat.name.split('(')[0].trim()"></span>
                  <span class="text-[12px] font-bold" :style="`color:${cat.color || getScoreColor(cat.score)}`" x-text="cat.score"></span>
                </div>
              </template>
            </div>
          </div>
        </div>
        <!-- Updated time -->
        <div class="text-right mt-3">
          <span class="text-[10px] text-dark-400" x-text="'Updated: ' + data.updated_at"></span>
        </div>
      </div>

      <!-- ===== CATEGORY SECTIONS (1-6) ===== -->
      <template x-for="(cat, catIdx) in data.categories" :key="cat.key">
        <div class="section-card">
          <!-- Category Header (accordion) -->
          <div class="cat-header" @click="toggleCat(cat.key)">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-lg flex items-center justify-center" :style="`background:${(cat.color||getScoreColor(cat.score))}20`">
                <span class="text-sm font-bold" :style="`color:${cat.color||getScoreColor(cat.score)}`" x-text="catIdx + 1"></span>
              </div>
              <div>
                <h3 class="text-base font-bold text-dark-50" x-text="cat.name"></h3>
                <p class="text-[11px] text-dark-300 mt-0.5" x-text="cat.description"></p>
              </div>
            </div>
            <div class="flex items-center gap-3">
              <span class="score-badge" :style="`background:${(cat.color||getScoreColor(cat.score))}20; color:${cat.color||getScoreColor(cat.score)}`">
                <span x-text="cat.score"></span><span class="ml-1 text-[10px] opacity-70" x-text="cat.label"></span>
              </span>
              <svg class="w-5 h-5 text-dark-300 transition-transform" :class="openCats[cat.key] ? 'rotate-180' : ''" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
            </div>
          </div>

          <!-- Category Content -->
          <div x-show="openCats[cat.key]" x-transition:enter="transition ease-out duration-200"
               x-transition:enter-start="opacity-0 -translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">

            <!-- Korea Summary -->
            <div class="mt-4 p-3 rounded-lg flex items-start gap-2" style="background:rgba(217,119,87,.08); border:1px solid rgba(217,119,87,.15);" x-show="cat.korea_summary">
              <svg class="w-4 h-4 text-accent mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582"/></svg>
              <p class="text-[12px] text-accent leading-relaxed" x-text="cat.korea_summary"></p>
            </div>

            <!-- Yield Curve Chart (rates only) -->
            <template x-if="cat.key === 'rates'">
              <div class="mt-4">
                <h4 class="text-xs font-semibold text-dark-300 uppercase tracking-wide mb-2">수익률 곡선 (Yield Curve)</h4>
                <div class="yield-curve-wrap">
                  <canvas :id="'yieldCurveChart'"></canvas>
                </div>
              </div>
            </template>

            <!-- CPI vs PPI chart (inflation only) -->
            <template x-if="cat.key === 'inflation'">
              <div class="mt-4">
                <h4 class="text-xs font-semibold text-dark-300 uppercase tracking-wide mb-2">CPI vs PPI 비교</h4>
                <div class="cpi-ppi-wrap">
                  <canvas :id="'cpiPpiChart'"></canvas>
                </div>
              </div>
            </template>

            <!-- Indicator Table -->
            <div class="table-scroll mt-4">
              <table class="macro-table" style="min-width:680px;">
                <thead>
                  <tr>
                    <th>지표명</th>
                    <th class="text-right">현재값</th>
                    <th class="text-right">MoM</th>
                    <th class="text-right">3M</th>
                    <th class="text-right">YoY</th>
                    <th class="text-center">시그널</th>
                    <th class="text-center">추이</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="(ind, indIdx) in cat.indicators" :key="ind.fred_id">
                    <tr @click="toggleIndicator(cat.key, indIdx)">
                      <td>
                        <div class="flex items-center gap-2">
                          <span class="text-dark-50 font-medium" x-text="ind.name"></span>
                          <span class="text-[10px] text-dark-400" x-text="ind.fred_id"></span>
                        </div>
                      </td>
                      <td class="text-right font-semibold text-dark-100 tabular-nums">
                        <span x-text="formatVal(ind.value, ind.unit)"></span>
                        <span class="text-[10px] text-dark-400 ml-1" x-text="ind.unit"></span>
                      </td>
                      <td class="text-right tabular-nums">
                        <span :class="ind.change_mom >= 0 ? 'text-up' : 'text-down'" x-text="fmtPct(ind.change_mom)"></span>
                      </td>
                      <td class="text-right tabular-nums">
                        <span :class="ind.change_3m >= 0 ? 'text-up' : 'text-down'" x-text="fmtPct(ind.change_3m)"></span>
                      </td>
                      <td class="text-right tabular-nums">
                        <span :class="ind.change_yoy >= 0 ? 'text-up' : 'text-down'" x-text="fmtPct(ind.change_yoy)"></span>
                      </td>
                      <td class="text-center">
                        <span class="badge" :class="getSignalBadge(ind.signal)" x-text="ind.signal"></span>
                      </td>
                      <td class="text-center">
                        <canvas :id="'spark_'+ind.fred_id" width="80" height="28" class="sparkline-canvas inline-block"></canvas>
                      </td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>

            <!-- Expandable Detail Panels -->
            <template x-for="(ind, indIdx) in cat.indicators" :key="'detail_'+ind.fred_id">
              <div x-show="openIndicators[cat.key+'_'+indIdx]" x-transition class="detail-panel fade-in">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div>
                    <div class="text-[10px] font-semibold text-dark-300 uppercase tracking-wide mb-1">이 지표는 무엇인가?</div>
                    <p class="text-[12px] text-dark-200 leading-relaxed" x-text="ind.description"></p>
                  </div>
                  <div>
                    <div class="text-[10px] font-semibold text-dark-300 uppercase tracking-wide mb-1">어떻게 읽는가?</div>
                    <p class="text-[12px] text-dark-200 leading-relaxed" x-text="ind.how_to_read"></p>
                  </div>
                  <div>
                    <div class="text-[10px] font-semibold text-accent uppercase tracking-wide mb-1">한국 시장 영향</div>
                    <p class="text-[12px] text-accent/80 leading-relaxed" x-text="ind.korea_impact"></p>
                  </div>
                </div>
              </div>
            </template>

          </div>
        </div>
      </template>

      <!-- ===== SECTION 7: MARKET SIGNALS (signal.json) ===== -->
      <div class="section-card">
        <div class="cat-header" @click="openMarket = !openMarket">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:rgba(59,130,246,.15);">
              <span class="text-sm font-bold text-info">7</span>
            </div>
            <div>

function macroDashboard() {
  return {
    loading: true,
    error: null,
    data: {},
    signalData: null,
    signalAlerts: [],
    marketTableRows: [],

    // Auth
    loggedIn: false,
    userEmail: null,

    // Accordion state
    openCats: {},
    openIndicators: {},
    openMarket: true,

    // Korea
    kospiPrice: '--',
    kospiChg: 0,
    krwPrice: '--',
    krwChg: 0,

    // Charts
    chartInstances: {},

    async init() {
      // Auth
      try {
        const loggedIn = await window._supabaseAuth.isLoggedIn();
        if (loggedIn) {
          const user = await window._supabaseAuth.getCurrentUser();
          this.loggedIn = true;
          this.userEmail = user?.email;
        }
      } catch(e) {}
      try {
        window._supabaseAuth.supabase.auth.onAuthStateChange((event, session) => {
          this.loggedIn = !!session?.user;
          this.userEmail = session?.user?.email || null;
        });
      } catch(e) {}

      await this.loadData();
    },

    async loadData() {
      this.loading = true;
      this.error = null;

      // Load macro.json (FRED data)
      let macroData = null;
      try {
        const res = await fetch('data/macro.json');
        if (res.ok) macroData = await res.json();
      } catch(e) {}

      if (!macroData) {
        try {
          macroData = await new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('GET', 'data/macro.json', true);
            xhr.onload = function() {
              if (xhr.status === 200 || xhr.status === 0) {
                try { resolve(JSON.parse(xhr.responseText)); } catch(e) { reject(e); }
              } else { reject(); }
            };
            xhr.onerror = () => reject();
            xhr.send();
          });
        } catch(e) {}
      }

      // Fallback to sample
      if (!macroData || !macroData.categories) {
        macroData = JSON.parse(JSON.stringify(SAMPLE_MACRO_DATA));
        console.log('[Macro] Using sample fallback data');
      }

      this.data = macroData;

      // Initialize accordions - all open
      for (const cat of this.data.categories) {
        this.openCats[cat.key] = true;
      }

      // Load market signals: prefer macro.json's market_signals, fallback to signal.json
      let marketSignalsLoaded = false;
      const ms = macroData.market_signals;
      if (ms && ((ms.status === 'ok' && ms.macro_data) || (ms.macro_data && ms.macro_data.length > 0))) {
        this.signalAlerts = ms.signals || [];
        this.buildMarketTable(ms.macro_data || []);
        const kospi = (ms.macro_data||[]).find(d => d.symbol === '^KS11');
        const krw = (ms.macro_data||[]).find(d => d.symbol === 'USDKRW=X');
        if (kospi) { this.kospiPrice = kospi.price.toLocaleString(); this.kospiChg = kospi.chg_1m; }
        if (krw) { this.krwPrice = krw.price.toLocaleString() + '원'; this.krwChg = krw.chg_1m; }
        marketSignalsLoaded = true;
        console.log('[Macro] Market signals loaded from macro.json');
      }

      if (!marketSignalsLoaded) {
        try {
          let sigData = null;
          try {
            const res2 = await fetch('data/signal.json');
            if (res2.ok) sigData = await res2.json();
          } catch(e) {
            sigData = await new Promise((resolve, reject) => {
              const xhr = new XMLHttpRequest();
              xhr.open('GET', 'data/signal.json', true);
              xhr.onload = function() {
                if (xhr.status === 200 || xhr.status === 0) {
                  try { resolve(JSON.parse(xhr.responseText)); } catch(e) { reject(e); }
                } else { reject(); }
              };
              xhr.onerror = () => reject();
              xhr.send();
            });
          }
          if (sigData && sigData.status === 'ok') {
            this.signalData = sigData;
            this.signalAlerts = sigData.signals || [];
            this.buildMarketTable(sigData.macro_data || []);
            const kospi = sigData.macro_data.find(d => d.symbol === '^KS11');
            const krw = sigData.macro_data.find(d => d.symbol === 'USDKRW=X');
            if (kospi) { this.kospiPrice = kospi.price.toLocaleString(); this.kospiChg = kospi.chg_1m; }
            if (krw) { this.krwPrice = krw.price.toLocaleString() + '원'; this.krwChg = krw.chg_1m; }
            console.log('[Macro] Market signals loaded from signal.json');
          }
        } catch(e) {
          console.log('[Macro] signal.json not loaded:', e);
        }
      }

      this.loading = false;

      // Build charts after DOM renders
      this.$nextTick(() => {
        setTimeout(() => {
          this.drawAllSparklines();
          this.drawYieldCurve();
          this.drawCpiPpi();
        }, 200);
      });
    },

    // ==================== ACCORDION ====================
    toggleCat(key) {
      this.openCats[key] = !this.openCats[key];
      if (this.openCats[key]) {
        this.$nextTick(() => {
          setTimeout(() => {
            this.drawSparklinesForCat(key);
            if (key === 'rates') this.drawYieldCurve();
            if (key === 'inflation') this.drawCpiPpi();
          }, 100);
        });
      }
    },

    toggleIndicator(catKey, indIdx) {
      const k = catKey + '_' + indIdx;
      this.openIndicators[k] = !this.openIndicators[k];
    },

    // ==================== SCORE COLOR ====================
    getScoreColor(score) {
      if (score >= 80) return '#22c55e';
      if (score >= 60) return '#84cc16';
      if (score >= 40) return '#eab308';
      if (score >= 20) return '#f97316';
      return '#ef4444';
    },

    // ==================== SIGNAL BADGES ====================
    getSignalBadge(signal) {
      if (!signal) return 'badge-sideways';
      const s = signal.toLowerCase();
      if (s.includes('strong') && s.includes('up')) return 'badge-strong-up';
      if (s.includes('moderate') && s.includes('up')) return 'badge-moderate-up';
      if (s.includes('strong') && s.includes('down')) return 'badge-strong-dn';
      if (s.includes('moderate') && s.includes('down')) return 'badge-moderate-dn';
      if (s.includes('reversal')) return 'badge-reversal';
      return 'badge-sideways';
    },

    // ==================== FORMATTERS ====================
    fmtPct(val) {
      if (val === null || val === undefined) return '--';
      return (val >= 0 ? '+' : '') + Number(val).toFixed(2) + '%';
    },

    formatVal(value, unit) {
      if (value === null || value === undefined) return '--';
      if (unit && (unit.includes('%') || unit === '%p')) return Number(value).toFixed(2);
      if (unit === '지수') return Number(value).toFixed(2);
      if (value >= 1000) return Number(value).toLocaleString(undefined, { maximumFractionDigits: 0 });
      return Number(value).toFixed(2);
    },

    formatMarketPrice(price, category) {
      if (price === null || price === undefined) return '--';
      if (category === 'rate') return price.toFixed(2) + '%';
      if (category === 'currency') {
        if (price > 100) return price.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        return price.toFixed(2);
      }
      if (price >= 1000) return price.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      return price.toFixed(2);
    },

    // ==================== MARKET TABLE ====================
    buildMarketTable(macroData) {
      const rows = [];
      for (const cat of MARKET_CATS) {
        rows.push({ isCat: true, catKey: cat.key, catLabel: cat.label });
        const items = macroData.filter(d => d.category === cat.key);
        for (const item of items) {
          rows.push({ ...item, isCat: false });
        }
      }
      this.marketTableRows = rows;
    },

    getMarketSignalLabel(row) {
      const pctFromSma = ((row.price - row.sma20) / row.sma20) * 100;
      const absPctFromSma = Math.abs(pctFromSma);
      if (row.category === 'volatility') {
        if (row.chg_1m > 10 && row.above_sma20) return 'Strong Uptrend';
        if (row.chg_1m > 0 && row.above_sma20) return 'Moderate Uptrend';
        if (row.chg_1m < -5 && !row.above_sma20) return 'Strong Downtrend';
        if (row.chg_1m < 0 && !row.above_sma20) return 'Moderate Downtrend';
        if (absPctFromSma < 2) return 'Reversal';
        return 'Sideways';
      }
      if (absPctFromSma < 2 && ((row.chg_1m > 0 && !row.above_sma20) || (row.chg_1m < 0 && row.above_sma20))) return 'Reversal';
      if (row.chg_1m > 10 && row.above_sma20) return 'Strong Uptrend';
      if (row.chg_1m > 0 && row.above_sma20) return 'Moderate Uptrend';
      if (row.chg_1m >= -5 && row.chg_1m <= 5) return 'Sideways';
      if (row.chg_1m < -5 && !row.above_sma20) return 'Strong Downtrend';
      if (row.chg_1m < 0 && !row.above_sma20) return 'Moderate Downtrend';
      return 'Sideways';
    },

    getMarketSignalBadge(row) {
      const label = this.getMarketSignalLabel(row);
      switch (label) {
        case 'Strong Uptrend':   return 'badge-strong-up';
        case 'Moderate Uptrend': return 'badge-moderate-up';
        case 'Sideways':         return 'badge-sideways';
        case 'Moderate Downtrend': return 'badge-moderate-dn';
        case 'Strong Downtrend': return 'badge-strong-dn';
        case 'Reversal':         return 'badge-reversal';
        default:                 return 'badge-sideways';
      }
    },

    // ==================== SPARKLINES ====================
    drawAllSparklines() {
      for (const cat of this.data.categories) {
        this.drawSparklinesForCat(cat.key);
      }
    },

    drawSparklinesForCat(catKey) {
      const cat = this.data.categories.find(c => c.key === catKey);
      if (!cat) return;
      for (const ind of cat.indicators) {
        this.drawSparkline(ind);
      }
    },

    drawSparkline(ind) {
      const canvas = document.getElementById('spark_' + ind.fred_id);
      if (!canvas || !ind.history || ind.history.length < 2) return;

      // Destroy existing
      const existingChart = Chart.getChart(canvas);
      if (existingChart) existingChart.destroy();

      const isUp = ind.history[ind.history.length - 1] >= ind.history[0];
      const color = isUp ? '#22c55e' : '#ef4444';

      new Chart(canvas, {
        type: 'line',
        data: {
          labels: ind.history.map((_, i) => i),
          datasets: [{
            data: ind.history,
            borderColor: color,
            borderWidth: 1.5,
            fill: true,
            backgroundColor: isUp ? 'rgba(34,197,94,.1)' : 'rgba(239,68,68,.1)',
            pointRadius: 0,
            tension: 0.4,
          }]
        },
        options: {
          responsive: false,
          maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { enabled: false } },
          scales: {
            x: { display: false },
            y: { display: false }
          },
          animation: { duration: 600 }
        }
      });
    },

    // ==================== YIELD CURVE ====================
    drawYieldCurve() {
      const canvas = document.getElementById('yieldCurveChart');
      if (!canvas) return;

      const existingChart = Chart.getChart(canvas);
      if (existingChart) existingChart.destroy();

      const ratesCat = this.data.categories.find(c => c.key === 'rates');
      if (!ratesCat) return;

      const maturityMap = { 'DGS2': '2Y', 'DGS5': '5Y', 'DGS10': '10Y', 'DGS30': '30Y' };
      const labels = [];
      const values = [];

      for (const fid of ['DGS2', 'DGS5', 'DGS10', 'DGS30']) {
        const ind = ratesCat.indicators.find(i => i.fred_id === fid);
        if (ind) {
          labels.push(maturityMap[fid]);
          values.push(ind.value);
        }
      }

      // Determine if inverted
      const isInverted = values.length >= 2 && values[0] > values[values.length - 1];

      new Chart(canvas, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: '현재 수익률곡선',
            data: values,
            borderColor: isInverted ? '#ef4444' : '#22c55e',
            backgroundColor: isInverted ? 'rgba(239,68,68,.1)' : 'rgba(34,197,94,.1)',
            borderWidth: 3,
            fill: true,
            pointRadius: 6,
            pointBackgroundColor: isInverted ? '#ef4444' : '#22c55e',
            pointBorderColor: '#151a26',
            pointBorderWidth: 2,
            tension: 0.3,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { labels: { color: '#94a3b8', font: { size: 11, family: 'Inter' } } },
            tooltip: {
              backgroundColor: '#1e293b',
              titleColor: '#e2e8f0',
              bodyColor: '#94a3b8',
              borderColor: 'rgba(255,255,255,.1)',
              borderWidth: 1,
              padding: 12,
              cornerRadius: 8,
              callbacks: {
                label: (ctx) => `${ctx.label}: ${ctx.raw.toFixed(2)}%`
              }
            },
            annotation: isInverted ? undefined : undefined
          },
          scales: {
            x: {
              ticks: { color: '#94a3b8', font: { size: 12, family: 'Inter', weight: 600 } },
              grid: { color: 'rgba(255,255,255,.04)' },
              border: { color: 'rgba(255,255,255,.08)' }
            },
            y: {
              ticks: {
                color: '#64748b',
                font: { size: 11, family: 'Inter' },
                callback: (val) => val.toFixed(1) + '%'
              },
              grid: { color: 'rgba(255,255,255,.04)' },
              border: { color: 'rgba(255,255,255,.08)' }
            }
          }
        }
      });

      // Also draw spread trend
      this.drawSpreadTrend(ratesCat);
    },

    drawSpreadTrend(ratesCat) {
      const spread = ratesCat.indicators.find(i => i.fred_id === 'T10Y2Y');
      if (!spread || !spread.history) return;
      // Use the sparkline canvas for this
    },

    // ==================== CPI vs PPI ====================
    drawCpiPpi() {
      const canvas = document.getElementById('cpiPpiChart');
      if (!canvas) return;

      const existingChart = Chart.getChart(canvas);
      if (existingChart) existingChart.destroy();

      const inflCat = this.data.categories.find(c => c.key === 'inflation');
      if (!inflCat) return;

      const cpi = inflCat.indicators.find(i => i.fred_id === 'CPIAUCSL');
      const coreCpi = inflCat.indicators.find(i => i.fred_id === 'CPILFESL');
      const ppi = inflCat.indicators.find(i => i.fred_id === 'PPIACO');
      const corePce = inflCat.indicators.find(i => i.fred_id === 'PCEPILFE');

      const labels = ['CPI', 'Core CPI', 'PPI', 'Core PCE'];
      const values = [
        cpi ? cpi.value : 0,
        coreCpi ? coreCpi.value : 0,
        ppi ? ppi.value : 0,
        corePce ? corePce.value : 0,
      ];

      new Chart(canvas, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: '현재 (% YoY)',
            data: values,
            backgroundColor: [
              'rgba(239,68,68,.7)',
              'rgba(249,115,22,.7)',
              'rgba(234,179,8,.7)',
              'rgba(59,130,246,.7)',
            ],
            borderRadius: 6,
            barPercentage: 0.6,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { labels: { color: '#94a3b8', font: { size: 11, family: 'Inter' } } },
            tooltip: {
              backgroundColor: '#1e293b',
              titleColor: '#e2e8f0',
              bodyColor: '#94a3b8',
              padding: 12,
              cornerRadius: 8,
              callbacks: {
                label: (ctx) => `${ctx.label}: ${ctx.raw.toFixed(1)}%`
              }
            }
          },
          scales: {
            x: {
              ticks: { color: '#94a3b8', font: { size: 12, family: 'Inter', weight: 600 } },
              grid: { display: false }
            },
            y: {
              ticks: {
                color: '#64748b',
                font: { size: 11, family: 'Inter' },
                callback: (val) => val + '%'
              },
              grid: { color: 'rgba(255,255,255,.04)' },
              beginAtZero: true,
            }
          }
        }
      });
    },

    // ==================== AUTH ====================
    async doSignOut() {
      await window._supabaseAuth.signOut();
      this.loggedIn = false;
      this.userEmail = null;
    }
  };
}
</script>
