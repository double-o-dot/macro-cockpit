<!-- ==================== MAIN CONTENT ==================== -->
<main class="page-main">

  <!-- Macro Banner -->
  <div class="hero p-5 md:p-6 mb-5 animate-fadeUp">
    <svg class="absolute -top-6 -right-6 opacity-[.06]" width="140" height="140"><circle cx="70" cy="70" r="70" fill="white"/></svg>
    <svg class="absolute bottom-2 left-[20%] opacity-[.04]" width="80" height="80"><circle cx="40" cy="40" r="40" fill="white"/></svg>
    <div class="relative z-10">
      <div class="text-xs text-white/50 font-medium tracking-wide uppercase">Macro Cockpit</div>
      <div class="text-2xl md:text-3xl font-extrabold mt-1 tracking-tight">Insights & Analysis</div>
      <div class="text-sm text-white/50 mt-2">투자 인사이트를 공유합니다</div>
      <!-- Macro indicators row -->
      <div class="flex gap-3 mt-4 overflow-x-auto hide-scrollbar">
        <template x-for="m in macroBanner" :key="m.symbol">
          <div class="bg-white/10 rounded-xl px-3 py-2 backdrop-blur-sm shrink-0">
            <div class="text-[10px] text-white/40" x-text="m.name"></div>
            <div class="text-sm font-bold" x-text="m.display"></div>
            <div class="text-[10px] mt-0.5" :class="m.chg >= 0 ? 'text-green-300' : 'text-red-300'" x-text="(m.chg >= 0 ? '+' : '') + m.chg.toFixed(1) + '%'"></div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Filter Tags -->
  <div class="flex items-center gap-2 mb-4 overflow-x-auto hide-scrollbar pb-1">
    <button class="shrink-0 px-3 py-1.5 rounded-full text-xs font-medium transition-all"
            :class="activeFilter === 'all' ? 'bg-warm-800 text-white' : 'bg-white text-warm-500 hover:bg-warm-100'"
            @click="activeFilter = 'all'">
      전체
    </button>
    <template x-for="tag in allTags" :key="tag">
      <button class="shrink-0 px-3 py-1.5 rounded-full text-xs font-medium transition-all"
              :class="activeFilter === tag ? 'bg-warm-800 text-white' : 'bg-white text-warm-500 hover:bg-warm-100'"
              @click="activeFilter = tag"
              x-text="tag">
      </button>
    </template>
  </div>

  <!-- Article Cards Grid -->
  <div class="mb-6">
    <div class="flex items-center justify-between mb-3">
      <span class="text-sm font-semibold">Infographic Reports</span>
      <span class="text-[10px] text-warm-400" x-text="filteredReports.length + '개'"></span>
    </div>
    <div class="space-y-3 md:grid md:grid-cols-2 md:gap-4 md:space-y-0">
      <template x-for="r in filteredReports" :key="r.id">
        <div class="scard p-0 overflow-hidden cursor-pointer group" @click="openReport(r.file, r.title)">
          <div class="h-2 bg-gradient-to-r from-accent to-orange-400"></div>
          <div class="p-5">
            <div class="flex items-center justify-between mb-2">
              <span class="text-[10px] font-medium text-warm-400" x-text="r.date"></span>
              <span class="text-[10px] text-warm-400" x-text="r.source || ''"></span>
            </div>
            <h3 class="text-sm font-bold mb-2 group-hover:text-accent transition-colors" x-text="r.title"></h3>
            <p class="text-xs text-warm-500 leading-relaxed mb-3" x-text="r.description"></p>
            <div class="flex flex-wrap gap-1">
              <template x-for="tag in (r.tags || [])" :key="tag">
                <span class="text-[10px] px-1.5 py-0.5 rounded-full bg-accent-50 text-accent font-medium" x-text="tag"></span>
              </template>
            </div>
            <div class="flex items-center gap-1.5 mt-3 pt-3 border-t border-warm-100 text-accent text-xs font-medium">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              보고서 보기
            </div>
          </div>
        </div>
      </template>
    </div>
    <template x-if="filteredReports.length === 0">
      <div class="flex flex-col items-center justify-center py-16 text-warm-400">
        <svg class="w-10 h-10 mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg>
        <p class="text-sm">해당 테마의 리포트가 없습니다</p>
      </div>
    </template>
  </div>

  <!-- PDF Digest Section -->
  <div class="mb-6" x-show="digestItems.length > 0">
    <div class="flex items-center justify-between mb-3">
      <span class="text-sm font-semibold">PDF Insights</span>
      <span class="text-[10px] text-warm-400" x-text="digestItems.length + '개 분석'"></span>
    </div>
    <div class="space-y-3 md:grid md:grid-cols-2 md:gap-4 md:space-y-0">
      <template x-for="(pdf, idx) in digestItems.slice(0, 5)" :key="idx">
        <div class="scard p-4">
          <div class="flex items-center justify-between mb-2">
            <span class="text-[11px] text-warm-400 truncate flex-1" x-text="pdf.filename"></span>
            <span class="text-sm font-bold ml-2 whitespace-nowrap"
                  :class="pdf.usefulness >= 8 ? 'text-accent' : pdf.usefulness >= 6 ? 'text-orange-500' : 'text-warm-400'"
                  x-text="pdf.usefulness + '/10'"></span>
          </div>
          <div class="w-full bg-warm-100 rounded-full h-1 mb-3">
            <div class="h-1 rounded-full" :class="pdf.usefulness >= 8 ? 'bg-accent' : pdf.usefulness >= 6 ? 'bg-orange-400' : 'bg-warm-300'" :style="'width:' + (pdf.usefulness * 10) + '%'"></div>
          </div>
          <p class="text-xs text-warm-600 leading-relaxed mb-2.5 line-clamp-3" x-text="pdf.summary"></p>
          <div class="flex flex-wrap gap-1 mb-1.5">
            <template x-for="t in (pdf.key_tickers || []).slice(0, 5)" :key="t">
              <span class="text-[10px] px-1.5 py-0.5 rounded-full bg-accent-50 text-accent font-medium" x-text="t"></span>
            </template>
          </div>
          <div class="flex flex-wrap gap-1">
            <template x-for="t in (pdf.themes || []).slice(0, 3)" :key="t">
              <span class="text-[10px] px-1.5 py-0.5 rounded-full bg-warm-100 text-warm-500" x-text="t"></span>
            </template>
          </div>
          <template x-if="pdf.action_suggestion">
            <div class="mt-2.5 pt-2.5 border-t border-warm-100">
              <p class="text-[11px] text-warm-500"><span class="text-accent font-medium">Action:</span> <span x-text="pdf.action_suggestion"></span></p>
            </div>
          </template>
        </div>
      </template>
    </div>
  </div>

</main>

<!-- ==================== REPORT OVERLAY ==================== -->
<div id="report-overlay" x-show="showReport" x-transition.opacity
     style="position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;flex-direction:column;"
     @keydown.escape.window="showReport=false" x-cloak>
  <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#2A2520;color:white;flex-shrink:0;">
    <span style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" x-text="reportTitle"></span>
    <div style="display:flex;gap:8px;flex-shrink:0;">
      <a :href="'./reports/' + reportFile" target="_blank" style="background:rgba(255,255,255,.12);color:white;border:none;border-radius:8px;padding:6px 12px;font-size:11px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:4px;">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        새 탭
      </a>
      <button @click="showReport=false" style="background:rgba(255,255,255,.12);color:white;border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;">&times;</button>
    </div>
  </div>
  <iframe :src="showReport ? './reports/' + reportFile : ''" style="flex:1;border:none;background:#F5F0EB;"></iframe>
</div>

<style>[x-cloak] { display: none !important; }</style>

<script type="module">
import { supabase, isLoggedIn, getCurrentUser, signOut } from './shared/supabase-client.js';

// Expose to Alpine
window._supabaseAuth = { isLoggedIn, getCurrentUser, signOut };
</script>

<script>
function insightsApp() {
  return {
    // Auth
    loggedIn: false,
    userEmail: null,

    // Data
    reports: [],
    digestItems: [],
    macroBanner: [],
    allTags: [],
    activeFilter: 'all',

    // Report overlay
    showReport: false,
    reportFile: '',
    reportTitle: '',

    async init() {
      // Check auth
      try {
        const loggedIn = await window._supabaseAuth.isLoggedIn();
        if (loggedIn) {
          const user = await window._supabaseAuth.getCurrentUser();
          this.loggedIn = true;
          this.userEmail = user?.email;
        }
      } catch (e) {}

      // Fetch all data in parallel
      const [reportsData, digestData, signalData] = await Promise.all([
        this.fetchJSON('data/reports.json'),
        this.fetchJSON('data/digest.json'),
        this.fetchJSON('data/signal.json')
      ]);

      // Reports
      if (reportsData?.status === 'ok' && reportsData.data) {
        this.reports = reportsData.data;
        // Extract unique tags
        const tagSet = new Set();
        this.reports.forEach(r => (r.tags || []).forEach(t => tagSet.add(t)));
        this.allTags = Array.from(tagSet).sort();
      }

      // Digest
      if (digestData?.status === 'ok' && digestData.data) {
        this.digestItems = digestData.data;
      }

      // Signal - macro banner
      if (signalData?.status === 'ok' && signalData.macro_data) {
        const picks = ['^VIX', 'CL=F', 'BZ=F', 'USDKRW=X', 'DX-Y.NYB', 'GC=F'];
        this.macroBanner = signalData.macro_data
          .filter(m => picks.includes(m.symbol))
          .map(m => ({
            symbol: m.symbol,
            name: m.name.length > 12 ? m.name.substring(0, 12) : m.name,
            display: m.price.toLocaleString('en-US', { maximumFractionDigits: 2 }),
            chg: m.chg_1d
          }));
      }
    },

    get filteredReports() {
      if (this.activeFilter === 'all') return this.reports;
      return this.reports.filter(r => (r.tags || []).includes(this.activeFilter));
    },

    openReport(file, title) {
      this.reportFile = file;
      this.reportTitle = title;
      this.showReport = true;
    },

    async doSignOut() {
      await window._supabaseAuth.signOut();
      this.loggedIn = false;
      this.userEmail = null;
    },

    async fetchJSON(url) {
      try {
        const r = await fetch(url);
        if (!r.ok) return { status: 'empty' };
        return await r.json();
      } catch (e) {
        return { status: 'error', message: e.message };
      }
    }
  };
}
</script>

</body>
</html>
