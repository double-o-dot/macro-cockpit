  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>

      extend: {
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },

          accent: { 50:'#FEF3ED', 100:'#FDE5D8', DEFAULT:'#D97757', dark:'#B85E42' },
          up:     '#34C759',
          down:   '#FF3B30',
        }

  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { background: #F5F1EB; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; animation: fadeUp .25s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    .skel { background: linear-gradient(90deg, #EBE5DC 25%, #F5F1EB 50%, #EBE5DC 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 16px; }

    /* Soft card */
    .scard { background: #fff; border-radius: 20px; box-shadow: 0 2px 12px rgba(0,0,0,.04); }
    .scard-sm { background: #fff; border-radius: 16px; box-shadow: 0 1px 8px rgba(0,0,0,.03); }

    /* Hero gradient */
    .hero { background: linear-gradient(145deg, #2A2520 0%, #4A3F35 60%, #5C4A3E 100%); border-radius: 24px; position: relative; overflow: hidden; color: #fff; }

    /* Bottom nav */
    .bnav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; background: #fff; border-top: 1px solid #EBE5DC;
      display: flex; justify-content: space-around; align-items: center; height: 60px; padding-bottom: env(safe-area-inset-bottom); }
    .bnav a { display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 10px; font-weight: 500;
      color: #B0A89C; transition: color .15s; text-decoration: none; padding: 6px 12px; }
    .bnav a.active { color: #D97757; }
    .bnav a .dot { width: 4px; height: 4px; border-radius: 50%; background: transparent; transition: background .15s; margin-top: 1px; }
    .bnav a.active .dot { background: #D97757; }

    /* Desktop sidebar */
    .sidebar { display: none; }
    .nav-link { transition: all .15s; }
    .nav-link:hover { background: rgba(255,255,255,.08); }
    .nav-link.active { background: rgba(255,255,255,.12); border-left: 3px solid #D97757; }

    /* Desktop layout */
    @media (min-width: 768px) {
      .sidebar { display: flex; }
      .bnav { display: none !important; }

    @media (max-width: 767px) {

    /* Avatar colors */
    .av-0 { background: #D97757; color: #fff; }
    .av-1 { background: #6C8EBF; color: #fff; }
    .av-2 { background: #85CDCA; color: #fff; }
    .av-3 { background: #C38D9E; color: #fff; }
    .av-4 { background: #E8A87C; color: #fff; }
    .av-5 { background: #41B3A3; color: #fff; }
    .av-6 { background: #7B68EE; color: #fff; }

    /* Signal level styles */
    .sig-danger  { background: #FFF5F5; border-left: 3px solid #FF3B30; }
    .sig-caution { background: #FFFBF0; border-left: 3px solid #FF9500; }
    .sig-calm    { background: #F0FFF4; border-left: 3px solid #34C759; }
    .sig-bullish { background: #F0FFF4; border-left: 3px solid #34C759; }
    .sig-bearish { background: #FFF5F5; border-left: 3px solid #FF3B30; }
    .sig-favorable { background: #F0FDFA; border-left: 3px solid #14B8A6; }
    .sig-neutral { background: #FAF8F5; border-left: 3px solid #D4CCC0; }
    .sig-info    { background: #F0F7FF; border-left: 3px solid #5AC8FA; }

    .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #D4CCC0; transition: all .15s; }
    .pin-dot.filled { background: #D97757; border-color: #D97757; }

      background: white; border: 1px solid #EBE5DC; color: #2A2520; user-select: none; -webkit-user-select: none; }
    .pin-key:active { background: #F5F1EB; transform: scale(0.93); }
    .pin-key.fn { background: transparent; border: none; font-size: 13px; color: #6B6560; }
  </style>
</head>

<!-- ==================== PIN LOCK ==================== -->
<div id="pin-screen" class="fixed inset-0 z-[100] bg-bg flex flex-col items-center justify-center px-6">
  <div class="flex items-center gap-2.5 mb-10">
    <div class="w-11 h-11 rounded-full bg-accent flex items-center justify-center">
      <span class="text-white text-lg font-bold">M</span>
    </div>
    <span class="text-xl font-semibold tracking-tight">Macro Cockpit</span>
  </div>
  <p id="pin-msg" class="text-sm text-warm-500 mb-6">PIN을 입력하세요</p>
  <div class="flex gap-4 mb-10" id="pin-dots">
    <div class="pin-dot"></div><div class="pin-dot"></div>
    <div class="pin-dot"></div><div class="pin-dot"></div>
  </div>
  <div class="grid grid-cols-3 gap-3" id="pin-pad">
    <div class="pin-key" data-v="1">1</div><div class="pin-key" data-v="2">2</div><div class="pin-key" data-v="3">3</div>
    <div class="pin-key" data-v="4">4</div><div class="pin-key" data-v="5">5</div><div class="pin-key" data-v="6">6</div>
    <div class="pin-key" data-v="7">7</div><div class="pin-key" data-v="8">8</div><div class="pin-key" data-v="9">9</div>
    <div class="pin-key fn" data-v="clear">Clear</div><div class="pin-key" data-v="0">0</div><div class="pin-key fn" data-v="back">&larr;</div>
  </div>
  <p id="pin-setup-hint" class="text-xs text-warm-400 mt-8 hidden">첫 접속: 사용할 PIN 4자리를 설정하세요</p>
</div>

<script>
(function(){
  const SK='mc_pin_hash'; let pin='',isSetup=!localStorage.getItem(SK),sf='';
  const dots=document.querySelectorAll('#pin-dots .pin-dot'),msg=document.getElementById('pin-msg'),hint=document.getElementById('pin-setup-hint');
  if(isSetup){msg.textContent='PIN 4자리를 설정하세요';hint.classList.remove('hidden');}
  async function hp(p){const e=new TextEncoder().encode(p+'_mc');const b=await crypto.subtle.digest('SHA-256',e);return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
  function ud(){dots.forEach((d,i)=>d.classList.toggle('filled',i<pin.length));}
  function shake(){const c=document.getElementById('pin-dots');c.style.animation='none';c.offsetHeight;c.style.animation='shake .4s ease';}
  async function ck(){
    const h=await hp(pin);
    if(isSetup){if(!sf){sf=pin;pin='';ud();msg.textContent='PIN을 다시 입력하세요';return;}
      if(pin===sf){localStorage.setItem(SK,h);localStorage.setItem('mc_ts',Date.now().toString());document.getElementById('pin-screen').style.display='none';}
      else{sf='';pin='';ud();shake();msg.textContent='불일치. 다시 설정하세요';}return;}
    if(h===localStorage.getItem(SK)){localStorage.setItem('mc_ts',Date.now().toString());document.getElementById('pin-screen').style.display='none';}
    else{pin='';ud();shake();msg.textContent='잘못된 PIN';setTimeout(()=>{msg.textContent='PIN을 입력하세요';},1500);}
  }
  document.getElementById('pin-pad').addEventListener('click',e=>{const k=e.target.closest('.pin-key');if(!k)return;const v=k.dataset.v;
    if(v==='clear'){pin='';ud();return;}if(v==='back'){pin=pin.slice(0,-1);ud();return;}if(pin.length>=4)return;pin+=v;ud();if(pin.length===4)setTimeout(ck,200);});
  const ts=parseInt(localStorage.getItem('mc_ts')||'0');if(!isSetup&&Date.now()-ts<7*86400000)document.getElementById('pin-screen').style.display='none';
})();
</script>

<script>
// ============================================================
// STATE
// ============================================================
const S = { tab:'overview', cache:{}, prices:{} };
const AVATAR_COLORS = 7;
const TABS = {
  overview:  { title:'Overview',     sub:'Investment Dashboard' },
  portfolio: { title:'Portfolio',    sub:'Holdings & Cash' },
  signal:    { title:'Macro Signal', sub:'Market Indicators' },
  digest:    { title:'PDF Insights', sub:'Research Analysis' },
  reports:   { title:'Reports',      sub:'Infographic Archive' },
};

// ============================================================
// NAV
// ============================================================
document.querySelectorAll('#sidebar-nav .nav-link, #bottom-nav a').forEach(el=>{
  el.addEventListener('click',()=>switchTab(el.dataset.tab));
});
function switchTab(tab) {
  S.tab = tab;
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(tab)?.classList.add('active');
  document.querySelectorAll('.nav-link').forEach(n=>{n.classList.toggle('active',n.dataset.tab===tab);n.classList.toggle('text-white/80',n.dataset.tab===tab);n.classList.toggle('text-white/50',n.dataset.tab!==tab);});
  document.querySelectorAll('#bottom-nav a').forEach(n=>n.classList.toggle('active',n.dataset.tab===tab));
  document.getElementById('page-title').textContent=TABS[tab]?.title||'';
  document.getElementById('page-subtitle').textContent=TABS[tab]?.sub||'';
  loadTab(tab);
}

// ============================================================
// DATA FETCH (static JSON)
// ============================================================
async function fetchAPI(ep) {
  if (S.cache[ep]) return S.cache[ep];
  try {
    const r = await fetch(`./data/${ep}.json`);
    if (!r.ok) return {status:'empty'};
    const d = await r.json();
    if (d.status==='ok') S.cache[ep]=d;
    return d;
  } catch(e) { return {status:'error',message:e.message}; }
}
async function loadTab(tab) {
  if (tab==='overview') return loadOverview();
  if (tab==='portfolio') return fetchAPI('portfolio').then(d=>{renderPortfolio(d);if(!Object.keys(S.prices).length)fetchAPI('prices').then(applyPrices);});
  if (tab==='signal') return fetchAPI('signal').then(renderSignal);
  if (tab==='digest') { fetchAPI('implications').then(renderImplications); return fetchAPI('digest').then(renderDigest); }
  if (tab==='reports') return fetchAPI('reports').then(renderReports);
}
async function loadOverview() {
  const [p,r,d]=await Promise.all([fetchAPI('portfolio'),fetchAPI('review'),fetchAPI('digest')]);
  renderOverview(p,r,d);
  fetchAPI('signal').then(renderOverviewSignals);
  fetchAPI('prices').then(applyPrices);
  fetchAPI('_meta').then(m=>{if(m&&m.built_at)document.getElementById('updated-at').textContent=m.built_at;});
}

// ============================================================
// UTILITIES
// ============================================================
function fmtMoney(n,cur){
  if(n==null)return'-';
  if(cur==='USD')return'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  return n.toLocaleString('ko-KR')+'원';
}
function fmtPct(n){if(n==null)return'-';return(n>0?'+':'')+n.toFixed(1)+'%';}
function pctCls(n){return n>0?'text-up':n<0?'text-down':'text-warm-500';}
function sigCls(l){return 'sig-'+(l||'neutral');}
function sigLabel(l){
  const m={danger:'위험',caution:'주의',calm:'안정',bullish:'강세',bearish:'약세',favorable:'긍정',neutral:'중립',info:'정보'};
  return m[l]||'중립';
}
function sigDot(l){
  const m={danger:'bg-down',caution:'bg-orange-400',calm:'bg-up',bullish:'bg-up',bearish:'bg-down',favorable:'bg-teal-500',neutral:'bg-warm-300',info:'bg-blue-400'};
  return m[l]||'bg-warm-300';
}
function emptyBox(msg){return `<div class="flex flex-col items-center justify-center py-16 text-warm-400"><svg class="w-10 h-10 mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg><p class="text-sm">${msg}</p></div>`;}
function errBox(msg){return `<div class="scard p-6 text-center"><p class="text-down text-sm">${msg}</p></div>`;}

// ============================================================
// OVERVIEW
// ============================================================
function renderOverview(p,r,d) {
  const el=document.getElementById('overview-content');
  if(p.status==='error'){el.innerHTML=errBox(p.message);return;}
  if(p.status==='empty'){el.innerHTML=emptyBox('Portfolio 데이터 없음');return;}

  const stats=r.status==='ok'?r.data.stats:{};
  const holdings=p.holdings||[];
  const cash=p.cash||{};
  let h='';

  // === HERO CARD ===
  h+=`<div class="hero p-5 md:p-6 mb-5">
    <svg class="absolute -top-6 -right-6 opacity-[.06]" width="140" height="140"><circle cx="70" cy="70" r="70" fill="white"/></svg>
    <svg class="absolute bottom-2 left-[20%] opacity-[.04]" width="80" height="80"><circle cx="40" cy="40" r="40" fill="white"/></svg>
    <svg class="absolute top-[40%] right-[30%] opacity-[.03]" width="50" height="50"><circle cx="25" cy="25" r="25" fill="white"/></svg>
    <div class="relative z-10">
      <div class="text-xs text-white/50 font-medium tracking-wide uppercase">Total Portfolio</div>
      <div id="hero-value" class="text-3xl md:text-4xl font-extrabold mt-1 tracking-tight">-</div>
      <div id="hero-sub" class="text-sm text-white/50 mt-1"></div>
      <div class="flex gap-4 mt-4">
        <div class="bg-white/10 rounded-xl px-3 py-2 backdrop-blur-sm">
          <div class="text-[10px] text-white/40">종목</div>
          <div class="text-sm font-bold">${holdings.length}</div>
        </div>
        <div class="bg-white/10 rounded-xl px-3 py-2 backdrop-blur-sm">
          <div class="text-[10px] text-white/40">승률</div>
          <div class="text-sm font-bold">${stats.win_rate!=null?stats.win_rate+'%':'-'}</div>
        </div>
        <div class="bg-white/10 rounded-xl px-3 py-2 backdrop-blur-sm">
          <div class="text-[10px] text-white/40">현금(USD)</div>
          <div class="text-sm font-bold">$${(cash.usd||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}</div>
        </div>
      </div>
    </div>
  </div>`;

  // === KPI SCROLL ===
  h+=`<div class="flex overflow-x-auto gap-3 mb-5 -mx-1 px-1 pb-1 hide-scrollbar md:grid md:grid-cols-4 md:overflow-visible">`;
  const kpis=[

function computeHeroValue(holdings,cash) {
  const fx=S.prices['__FX__']||1450; // USD/KRW fallback
  let usd=0,krw=0;
  (holdings||[]).forEach(s=>{
    const cp=S.prices[s.code];
    const v=cp!=null?s.quantity*cp:s.est_value;
    if(s.currency==='USD')usd+=v; else krw+=v;
  });
  usd+=(cash?.usd||0); krw+=(cash?.krw||0);
  const totalKRW=krw+usd*fx;
  const hv=document.getElementById('hero-value');
  const hs=document.getElementById('hero-sub');
  if(hv){
    if(totalKRW>=100000000) hv.textContent=(totalKRW/100000000).toFixed(2)+'억원';
    else if(totalKRW>=10000) hv.textContent=Math.round(totalKRW/10000).toLocaleString()+'만원';
    else hv.textContent=totalKRW.toLocaleString()+'원';
  }
  if(hs){hs.textContent=`$${usd.toLocaleString('en-US',{maximumFractionDigits:0})} + ${krw.toLocaleString()}원 · 환율 ${fx.toFixed(0)}원`;}
}

function applyPrices(pr) {
  if(!pr||pr.status!=='ok'||!pr.prices) return;
  S.prices=pr.prices;
  const p=S.cache.portfolio;
  if(p&&p.status==='ok'){
    computeHeroValue(p.holdings,p.cash);
    if(S.tab==='overview'){
      const r=S.cache.review||{};const d=S.cache.digest||{};
      renderOverview(p,r,d);
      if(S.cache.signal)renderOverviewSignals(S.cache.signal);
    }
    if(S.tab==='portfolio')renderPortfolio(p);
  }
}

      <div style="display:flex;gap:8px;flex-shrink:0;">
        <a href="./reports/${file}" target="_blank" style="background:rgba(255,255,255,.12);color:white;border:none;border-radius:8px;padding:6px 12px;font-size:11px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:4px;">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          새 탭
        </a>
        <button onclick="document.getElementById('report-overlay').remove()" style="background:rgba(255,255,255,.12);color:white;border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;">&times;</button>
      </div>
    </div>
    <iframe src="./reports/${file}" style="flex:1;border:none;background:#F5F0EB;border-radius:0 0 0 0;"></iframe>
  `;
  document.body.appendChild(overlay);

  // Close on ESC
  const esc=e=>{if(e.key==='Escape'){overlay.remove();document.removeEventListener('keydown',esc);}};
  document.addEventListener('keydown',esc);
}

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded',()=>loadOverview());
</script>
