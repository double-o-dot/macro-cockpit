<main class="page-main" style="max-width:1120px;">

  <!-- Hero Section -->

    <div class="mb-6">
      <p class="text-xs font-semibold tracking-widest uppercase mb-3" style="color:#1A7A4C;">Macro Cockpit</p>
      <h1 class="font-serif text-3xl md:text-[44px] leading-tight text-gray-900" style="letter-spacing:-0.02em;">
        Insights for a<br class="hidden md:block"> Sustainable Portfolio
      </h1>
      <p class="text-sm text-gray-400 mt-3">투자 인사이트와 리서치를 공유합니다</p>
    </div>

    <!-- Macro Indicator Strip -->
    <div class="flex gap-3 overflow-x-auto hide-scrollbar pb-1" x-show="macroBanner.length > 0">
      <template x-for="m in macroBanner" :key="m.symbol">
        <div class="bg-gray-50 rounded-xl px-4 py-2.5 shrink-0 border border-gray-100">
          <div class="text-[10px] text-gray-400 font-medium" x-text="m.name"></div>
          <div class="text-sm font-bold text-gray-900" x-text="m.display"></div>
          <div class="text-[10px] mt-0.5 font-medium"
               :class="m.chg >= 0 ? 'text-green-600' : 'text-red-500'"
               x-text="(m.chg >= 0 ? '+' : '') + m.chg.toFixed(1) + '%'"></div>
        </div>
      </template>
    </div>
  </section>

  <!-- Two Column Layout -->
  <div class="flex flex-col md:flex-row gap-8 md:gap-10">

    <!-- Left: Article List -->
    <div class="flex-1 min-w-0">
      <div class="flex items-center justify-between mb-5">
        <h2 class="font-serif text-xl md:text-2xl">Our Trending Articles</h2>
        <span class="text-xs text-gray-400" x-text="filteredReports.length + '개'"></span>
      </div>

      <!-- Filter Tags -->
      <div class="flex items-center gap-2 mb-6 overflow-x-auto hide-scrollbar pb-1">
        <button class="shrink-0 px-3.5 py-1.5 rounded-full text-xs font-medium transition-all border"
                :class="activeFilter === 'all' ? 'text-white border-transparent' : 'bg-white text-gray-500 border-gray-200 hover:text-green-700 hover:border-green-300'"
                :style="activeFilter === 'all' ? 'background:#1A7A4C' : ''"
                @click="activeFilter = 'all'">
          전체
        </button>
        <template x-for="tag in allTags" :key="tag">
          <button class="shrink-0 px-3.5 py-1.5 rounded-full text-xs font-medium transition-all border"
                  :class="activeFilter === tag ? 'text-white border-transparent' : 'bg-white text-gray-500 border-gray-200 hover:text-green-700 hover:border-green-300'"
                  :style="activeFilter === tag ? 'background:#1A7A4C' : ''"
                  @click="activeFilter = tag"
                  x-text="tag">
          </button>
        </template>
      </div>

      <!-- Article List (Editorial Style) -->
      <div class="divide-y divide-gray-100">
        <template x-for="(r, idx) in filteredReports" :key="r.id">
          <article class="py-5 cursor-pointer group" @click="openReport(r.file, r.title)">
            <div class="flex items-start gap-4">
              <span class="text-sm font-mono pt-0.5 shrink-0" style="color:rgba(26,122,76,.35);" x-text="String(idx+1).padStart(2,'0')"></span>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                  <span class="text-[11px] text-gray-400" x-text="r.date"></span>
                  <template x-if="r.source">
                    <span class="text-[11px] text-gray-300">&middot;</span>
                  </template>
                  <span class="text-[11px] text-gray-400" x-text="r.source || ''"></span>
                </div>
                <h3 class="font-serif text-lg md:text-xl leading-snug transition-colors mb-1.5 group-hover:text-green-700" x-text="r.title"></h3>
                <p class="text-[13px] text-gray-500 leading-relaxed mb-2.5"
                   style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;"
                   x-text="r.description"></p>
                <div class="flex flex-wrap gap-1.5">
                  <template x-for="tag in (r.tags || [])" :key="tag">
                    <span class="text-[10px] px-2 py-0.5 rounded-full font-medium"
                          style="background:#F0FDF4;color:#1A7A4C;"
                          x-text="tag"></span>
                  </template>
                </div>
              </div>
              <div class="shrink-0 w-8 h-8 rounded-full bg-gray-50 group-hover:bg-green-50 flex items-center justify-center transition-colors mt-1">
                <svg class="w-4 h-4 text-gray-300 group-hover:text-green-600 transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
              </div>
            </div>
          </article>
        </template>
      </div>

      <!-- Empty State -->
      <template x-if="filteredReports.length === 0">
        <div class="flex flex-col items-center justify-center py-16 text-gray-400">
          <svg class="w-10 h-10 mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg>
          <p class="text-sm">해당 테마의 리포트가 없습니다</p>
        </div>
      </template>
    </div>

    <!-- Right: Sidebar -->
    <aside class="w-full md:w-72 lg:w-80 shrink-0">

      <!-- Featured Article -->
      <template x-if="reports.length > 0">
        <div class="rounded-2xl p-6 text-white mb-5 cursor-pointer group"
             style="background:linear-gradient(145deg,#0D4A2D 0%,#1A7A4C 100%);"

          <div class="text-[10px] font-semibold tracking-widest uppercase opacity-60 mb-3">FEATURED</div>
          <h3 class="font-serif text-xl leading-snug mb-2" x-text="reports[0]?.title"></h3>

        </div>
      </template>

      <!-- Market Snapshot -->

        <div class="space-y-3">
          <template x-for="m in macroBanner" :key="m.symbol">

              <span class="text-[13px] text-gray-500" x-text="m.name"></span>
              <div class="flex items-center gap-2">
                <span class="text-[13px] font-semibold" x-text="m.display"></span>
                <span class="text-[11px] font-medium px-1.5 py-0.5 rounded"
                      :class="m.chg >= 0 ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-600'"
                      x-text="(m.chg >= 0 ? '+' : '') + m.chg.toFixed(1) + '%'"></span>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- Quick Links -->
      <div class="rounded-2xl border border-gray-100 p-5">
        <h4 class="text-xs font-semibold text-gray-900 uppercase tracking-wider mb-4">Quick Links</h4>
        <div class="space-y-2.5">
          <a href="macro.html" class="flex items-center gap-3 text-[13px] text-gray-600 hover:text-green-700 transition-colors group">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0 transition-colors"
                 style="background:#F0FDF4;" class="group-hover:bg-green-100">
              <svg class="w-4 h-4" style="color:#1A7A4C;" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75z"/></svg>
            </div>
            매크로 대시보드
          </a>
          <a href="prices.html" class="flex items-center gap-3 text-[13px] text-gray-600 hover:text-green-700 transition-colors group">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0 transition-colors"
                 style="background:#F0FDF4;">
              <svg class="w-4 h-4" style="color:#1A7A4C;" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            실시간 주식가격
          </a>
          <a href="portfolio.html" class="flex items-center gap-3 text-[13px] text-gray-600 hover:text-green-700 transition-colors group">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0 transition-colors"
                 style="background:#F0FDF4;">
              <svg class="w-4 h-4" style="color:#1A7A4C;" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path d="M9 12l2 2 4-4"/></svg>
            </div>
            포트폴리오
          </a>
        </div>
      </div>
    </aside>

  </div>

</main>

<!-- ==================== REPORT OVERLAY ==================== -->
<div id="report-overlay" x-show="showReport" x-transition.opacity
     style="position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;flex-direction:column;"
     @keydown.escape.window="showReport=false" x-cloak>
  <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#0D4A2D;color:white;flex-shrink:0;">
    <span style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" x-text="reportTitle"></span>
    <div style="display:flex;gap:8px;flex-shrink:0;">
      <a :href="'./reports/' + reportFile" target="_blank" style="background:rgba(255,255,255,.12);color:white;border:none;border-radius:8px;padding:6px 12px;font-size:11px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:4px;">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        새 탭
      </a>
      <button @click="showReport=false" style="background:rgba(255,255,255,.12);color:white;border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;">&times;</button>
    </div>
  </div>
  <iframe :src="showReport ? './reports/' + reportFile : ''" style="flex:1;border:none;background:white;"></iframe>
</div>

<style>[x-cloak] { display: none !important; }</style>

<script type="module">
import { supabase, isLoggedIn, getCurrentUser, signOut } from './shared/supabase-client.js';
window._supabaseAuth = { isLoggedIn, getCurrentUser, signOut };
</script>

<script>
function insightsApp() {
  return {
    loggedIn: false,
    userEmail: null,
    reports: [],
    macroBanner: [],
    allTags: [],
    activeFilter: 'all',
    showReport: false,
    reportFile: '',
    reportTitle: '',

    async init() {
      try {
        const loggedIn = await window._supabaseAuth.isLoggedIn();
        if (loggedIn) {
          const user = await window._supabaseAuth.getCurrentUser();
          this.loggedIn = true;
          this.userEmail = user?.email;
        }
      } catch (e) {}

      const [reportsData, signalData] = await Promise.all([
        this.fetchJSON('data/reports.json'),
        this.fetchJSON('data/signal.json')
      ]);

      if (reportsData?.status === 'ok' && reportsData.data) {
        this.reports = reportsData.data;
        const tagSet = new Set();
        this.reports.forEach(r => (r.tags || []).forEach(t => tagSet.add(t)));
        this.allTags = Array.from(tagSet).sort();
      }

      if (signalData?.status === 'ok' && signalData.macro_data) {
        const picks = ['^VIX', 'CL=F', 'BZ=F', 'USDKRW=X', 'DX-Y.NYB', 'GC=F'];
        this.macroBanner = signalData.macro_data
          .filter(m => picks.includes(m.symbol))
          .map(m => ({
            symbol: m.symbol,
            name: m.name.length > 12 ? m.name.substring(0, 12) : m.name,
            display: m.price.toLocaleString('en-US', { maximumFractionDigits: 2 }),
            chg: m.chg_1d
          }));
      }
    },

    get filteredReports() {
      if (this.activeFilter === 'all') return this.reports;
      return this.reports.filter(r => (r.tags || []).includes(this.activeFilter));
    },

    openReport(file, title) {
      this.reportFile = file;
      this.reportTitle = title;
      this.showReport = true;
    },

    async doSignOut() {
      await window._supabaseAuth.signOut();
      this.loggedIn = false;
      this.userEmail = null;
    },

    async fetchJSON(url) {
      try {
        const r = await fetch(url);
        if (!r.ok) return { status: 'empty' };
        return await r.json();
      } catch (e) {
        return { status: 'error', message: e.message };
      }
    }
  };
}
</script>
