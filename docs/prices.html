<main class="page-main">

    <div>

      <template x-for="m in macroIndicators" :key="m.symbol">

            </div>
            <div class="min-w-0">
              <div class="text-xs font-medium truncate" x-text="m.name"></div>
              <div class="text-[10px] text-warm-400" x-text="'SMA20 ' + (m.above_sma20 ? '상회' : '하회')"></div>
            </div>

          <div class="text-lg font-bold" x-text="formatPrice(m.price)"></div>

            <span class="text-[10px]" :class="m.chg_1d >= 0 ? 'text-up' : 'text-down'" x-text="fmtPct(m.chg_1d)">1D</span>

                  </div>
                </div>

              <td class="py-3 px-4 text-right text-warm-500" x-text="h.currency === 'USD' ? '$' + h.avg_price.toFixed(2) : h.avg_price.toLocaleString() + '원'"></td>

<script type="module">
import { supabase, isLoggedIn, getCurrentUser, signOut } from './shared/supabase-client.js';
window._supabaseAuth = { isLoggedIn, getCurrentUser, signOut };
</script>

<script>
function pricesApp() {
  return {
    loggedIn: false,
    userEmail: null,
    holdingPrices: [],
    watchlistPrices: [],
    macroIndicators: [],
    signals: [],
    prices: {},
    lastUpdated: '',
    autoRefresh: false,
    refreshInterval: null,

    async init() {
      // Auth check
      try {
        const loggedIn = await window._supabaseAuth.isLoggedIn();
        if (loggedIn) {
          const user = await window._supabaseAuth.getCurrentUser();
          this.loggedIn = true;
          this.userEmail = user?.email;
        }
      } catch (e) {}

      await this.loadData();
    },

    async loadData() {
      const [pricesData, portfolioData, signalData, metaData] = await Promise.all([
        this.fetchJSON('data/prices.json'),
        this.fetchJSON('data/portfolio.json'),
        this.fetchJSON('data/signal.json'),
        this.fetchJSON('data/_meta.json')
      ]);

      // Detect prices.json structure
      let newPriceFormat = false;
      let pricesByTicker = {};
      let pricesByCode = {};

      if (pricesData) {
        if (pricesData.updated_at && pricesData.holdings) {
          // New structure
          newPriceFormat = true;
          (pricesData.holdings || []).forEach(p => {
            pricesByTicker[p.ticker] = p;
          });
          this.lastUpdated = pricesData.updated_at;

          // Watchlist from new format
          this.watchlistPrices = (pricesData.watchlist || []).map(w => {
            const rangePct = (w.high_52w && w.low_52w && w.high_52w !== w.low_52w)
              ? Math.max(0, Math.min(100, ((w.current_price - w.low_52w) / (w.high_52w - w.low_52w)) * 100))
              : 50;
            return {
              ...w,
              priceDisplay: w.currency === 'KRW'
                ? w.current_price.toLocaleString() + '원'
                : '$' + w.current_price.toFixed(2),
              changeDisplay: w.change_pct != null ? ((w.change_pct >= 0 ? '+' : '') + w.change_pct.toFixed(1) + '%') : '-',
              rangePct
            };
          });
        } else if (pricesData.status === 'ok' && pricesData.prices) {
          // Old structure
          pricesByCode = pricesData.prices;
        }
      }

      // Holdings with prices
      if (portfolioData?.status === 'ok' && portfolioData.holdings) {
        this.holdingPrices = portfolioData.holdings.map(h => {
          let cp = null;
          let changePct = null;
          let high52 = null;
          let low52 = null;

          // Try new format first (by ticker)
          if (newPriceFormat && pricesByTicker[h.ticker]) {
            const pd = pricesByTicker[h.ticker];
            cp = pd.current_price;
            changePct = pd.change_pct;
            high52 = pd.high_52w;
            low52 = pd.low_52w;
          }
          // Fallback to old format (by code)
          if (cp == null && pricesByCode[h.code]) {
            cp = pricesByCode[h.code];
          }

          const hasPrice = cp != null;
          const pnlPct = hasPrice ? ((cp - h.avg_price) / h.avg_price * 100) : 0;
          const evalVal = hasPrice ? h.quantity * cp : h.est_value;

          // 52-week range position
          const rangePct = (high52 && low52 && high52 !== low52 && hasPrice)
            ? Math.max(0, Math.min(100, ((cp - low52) / (high52 - low52)) * 100))
            : 50;

          return {
            ...h,
            hasPrice,
            currentPrice: cp,
            changePct: changePct ?? pnlPct,
            high_52w: high52,
            low_52w: low52,
            rangePct,
            currentDisplay: hasPrice
              ? (h.currency === 'USD' ? '$' + cp.toFixed(2) : cp.toLocaleString() + '원')
              : (h.currency === 'USD' ? '$' + h.avg_price.toFixed(2) : h.avg_price.toLocaleString() + '원'),
            changeDisplay: hasPrice
              ? ((changePct != null ? changePct : pnlPct) >= 0 ? '+' : '') + (changePct != null ? changePct : pnlPct).toFixed(1) + '%'
              : '-',
            evalDisplay: hasPrice
              ? (h.currency === 'USD' ? '$' + evalVal.toFixed(2) : evalVal.toLocaleString() + '원')
              : (h.currency === 'USD' ? '$' + h.est_value.toFixed(2) : h.est_value.toLocaleString() + '원')
          };
        });
      }

      // Macro indicators
      if (signalData?.status === 'ok') {
        if (signalData.macro_data) {
          this.macroIndicators = signalData.macro_data;
        }
        if (signalData.signals) {
          this.signals = signalData.signals;
        }
      }

      // Meta (fallback for lastUpdated)
      if (!this.lastUpdated && metaData?.built_at) {
        this.lastUpdated = metaData.built_at;
      }
    },

    toggleAutoRefresh() {
      this.autoRefresh = !this.autoRefresh;
      if (this.autoRefresh) {
        this.refreshInterval = setInterval(() => this.loadData(), 60000);
      } else {
        if (this.refreshInterval) {
          clearInterval(this.refreshInterval);
          this.refreshInterval = null;
        }
      }
    },

    formatPrice(p) {
      if (p == null) return '-';
      return p.toLocaleString('en-US', { maximumFractionDigits: 2 });
    },

    fmtPct(n) {
      if (n == null) return '-';
      return (n > 0 ? '+' : '') + n.toFixed(1) + '%';
    },

    sigCls(l) {
      const m = { danger: 'sig-danger', caution: 'sig-caution', calm: 'sig-calm', bullish: 'sig-bullish', bearish: 'sig-bearish', favorable: 'sig-favorable', neutral: 'sig-neutral', info: 'sig-info' };
      return m[l] || 'sig-neutral';
    },
    sigDot(l) {
      const m = { danger: 'bg-down', caution: 'bg-orange-400', calm: 'bg-up', bullish: 'bg-up', bearish: 'bg-down', favorable: 'bg-teal-500', neutral: 'bg-warm-300', info: 'bg-blue-400' };
      return m[l] || 'bg-warm-300';
    },
    sigLabel(l) {
      const m = { danger: '위험', caution: '주의', calm: '안정', bullish: '강세', bearish: '약세', favorable: '긍정', neutral: '중립', info: '정보' };
      return m[l] || '중립';
    },

    async doSignOut() {
      await window._supabaseAuth.signOut();
      this.loggedIn = false;
      this.userEmail = null;
    },

    async fetchJSON(url) {
      try {
        const r = await fetch(url);
        if (!r.ok) return { status: 'empty' };
        return await r.json();
      } catch (e) {
        return { status: 'error', message: e.message };
      }
    }
  };
}
</script>
